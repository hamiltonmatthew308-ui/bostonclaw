appId: com.bostonclaw.dispatcher
productName: Bostonclaw
copyright: Copyright © 2026 Bostonclaw Community
compression: maximum
artifactName: bostonclaw-setup-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "icons/**/*"
      - "tray-icons/**/*"
      - "freeclaw/**/*"
      - "hermes/**/*"
      - "node-runtime/**/*"
      - "openclaw-bundle/**/*"
      - "python-embed/**/*"
      - "uv*"

asar: true

win:
  target: nsis
  icon: resources/icons/icon.ico
  artifactName: "bostonclaw-setup-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Bostonclaw
  uninstallDisplayName: Bostonclaw

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icons/icon.icns
  category: public.app-category.productivity

dmg:
  size: 1g
