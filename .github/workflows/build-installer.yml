name: Build Installer

on:
  push:
    paths:
      - 'apps/openclaw-installer/**'
      - 'packages/shared/**'
      - '.github/workflows/build-installer.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'apps/openclaw-installer/**'
      - 'packages/shared/**'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:

env:
  # GitHub Actions JS actions will be forced to Node.js 24 soon; opt-in now to reduce churn.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Debug workspace
        run: |
          git --version
          git status --porcelain
          git rev-parse --is-inside-work-tree
          git rev-parse HEAD
          node --version || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle offline resources
        run: pnpm --filter bostonclaw-installer bundle:all

      - name: Type check
        run: pnpm --filter bostonclaw-installer typecheck

      - name: Build renderer + main
        run: pnpm --filter bostonclaw-installer build:vite

      - name: Package Windows NSIS
        run: pnpm --filter bostonclaw-installer exec electron-builder --win --publish ${{ github.ref_type == 'tag' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bostonclaw-setup-windows
          # Upload the full release dir to avoid missing artifacts when electron-builder
          # changes output file naming or adds subfolders.
          path: apps/openclaw-installer/release/**
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Debug workspace
        run: |
          which git || true
          git --version
          git status --porcelain
          git rev-parse --is-inside-work-tree
          git rev-parse HEAD
          node --version || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle offline resources
        run: |
          pnpm --filter bostonclaw-installer bundle:node
          pnpm --filter bostonclaw-installer bundle:openclaw

      - name: Type check
        run: pnpm --filter bostonclaw-installer typecheck

      - name: Build renderer + main
        run: pnpm --filter bostonclaw-installer build:vite

      - name: Package macOS DMG
        run: pnpm --filter bostonclaw-installer exec electron-builder --mac --publish ${{ github.ref_type == 'tag' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: bostonclaw-setup-macos
          path: apps/openclaw-installer/release/**
          if-no-files-found: error
